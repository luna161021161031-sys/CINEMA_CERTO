<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CinePro Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
* { 
    box-sizing: border-box;
    margin: 0; 
    padding: 0; 
    font-family: 'Plus Jakarta Sans', sans-serif; 
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #000000;
    overflow: hidden;
}

.caixa {
    background: rgba(15, 15, 15, 0.8);
    backdrop-filter: blur(20px);
    padding: 60px 45px;
    border-radius: 12px; 
    box-shadow: 0 40px 80px rgba(0,0,0,0.8);
    width: 450px; 
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

h1 { 
    color: #fff; 
    margin-bottom: 10px; 
    font-size: 32px; 
    font-weight: 800;
    letter-spacing: -1px;
}

header p { 
    color: rgba(255, 255, 255, 0.5); 
    margin-bottom: 40px; 
    font-size: 15px;
}

.input-group {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    outline: none;
    background: rgba(255, 255, 255, 0.05);
    transition: 0.3s;
    font-size: 15px;
    color: #fff;
}

input:focus {
    border-color: #e50914; 
    background: rgba(255, 255, 255, 0.08);
}

input::placeholder {
    color: rgba(255, 255, 255, 0.3);
}

.btn-login {
    width: 100%;
    padding: 16px;
    background: #e50914;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-login:hover {
    background: #b20710;
    transform: translateY(-2px);
}

.area-registro {
    margin-top: 35px;
    padding-top: 25px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.area-registro p {
    color: rgba(255, 255, 255, 0.4);
    font-size: 14px;
    margin-bottom: 8px;
}

.link-registro {
    color: #e50914; 
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    transition: 0.2s;
}

.link-registro:hover {
    color: #fff;
    text-decoration: underline;
        }

@media (max-width: 480px) {
    body {
        align-items: flex-start;
        padding: 40px 20px;
        overflow-y: auto;
    }

    .caixa {
        width: 100%;
        padding: 40px 25px;
        box-shadow: none;
    }

    h1 {
        font-size: 26px;
    }

    header p {
        margin-bottom: 30px;
        font-size: 14px;
    }

    input, .btn-login {
        padding: 14px;
        font-size: 14px;
    }

    .area-registro {
        margin-top: 25px;
        padding-top: 20px;
    }
}
 </style>
</head>
<body>
    <main class="caixa">
        <header>
            <h1>CINEPRO<span> ULTRA</span></h1>
            <p>Entre com seus dados de acesso</p>
        </header>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="usuario" name="usuario" placeholder="Utilizador" required>
            </div>
            <div class="input-group">
                <input type="password" id="senha" name="senha" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn-login">ENTRAR</button>
        </form>

        <div class="area-registro">
            <p>Não possui uma conta?</p>
            <a href="cadastro.html" class="link-registro">CRIAR NOVA CONTA</a>
        </div>
    </main>

<script>
    const baseUrl = 'https://seu-cinema.onrender.com';

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault(); 

        const usuario = document.getElementById('usuario').value;
        const senha = document.getElementById('senha').value;

        try {
            const response = await fetch(`${baseUrl}/logar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, senha })
            });

            if (response.ok) {
                const dados = await response.json();

                localStorage.setItem('usuarioLogado', 'true');
                localStorage.setItem('nomeUsuario', dados.usuario);
                localStorage.setItem('tipoUsuario', dados.tipo_usuario);

                const urlPretendida = localStorage.getItem('urlPretendida');

                if (dados.tipo_usuario === 'admin') {
                    window.location.href = "admin.html";
                } else if (urlPretendida) {
                    localStorage.removeItem('urlPretendida');

                    const urlLimpa = urlPretendida.replace('views/', '').replace(/^\//, '');
                    window.location.href = urlLimpa;
                } else {
                    window.location.href = "menu.html";
                }
            } else {
                alert('Utilizador ou senha incorretos.');
            }
        } catch (err) {
            console.error("Erro ao logar:", err);
            alert("Erro ao conectar com o servidor.");
        }
    });
</script>
</body>
</html>
