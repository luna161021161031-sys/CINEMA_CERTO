<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Reserva - CinePro Ultra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Plus Jakarta Sans', sans-serif; 
}

body { 
    background: radial-gradient(circle at 50% 35%, #141519 0%, #050505 75%);
    color: #fff; 
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center; 
    padding: 20px;
    background-attachment: fixed;
}

.booking-card {
    background: rgba(15, 15, 15, 0.7);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px; 
    width: 100%;
    max-width: 550px;
    min-height: 550px; 
    padding: 50px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.step-title {
    color: #e50914;
    text-transform: uppercase;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 4px;
    margin-bottom: 8px;
    display: block;
    transition: color 0.3s ease;
}

h2 { 
    font-size: 26px; 
    font-weight: 800; 
    margin-bottom: 30px; 
    letter-spacing: -1px; 
}

.info-group {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 12px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    text-align: left;
}

.info-label {
    color: rgba(255,255,255,0.4);
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: block;
}

.info-value {
    font-size: 15px;
    font-weight: 600;
}

.info-value i { 
    color: #e50914; 
    margin-right: 8px; 
    transition: color 0.3s ease;
}

.summary-box {
    background: rgba(229, 9, 20, 0.08);
    border-bottom: 2px solid #e50914;
    padding: 20px;
    border-radius: 8px;
    margin-top: 20px;
    text-align: left;
    transition: all 0.3s ease;
}

.summary-box.vip-summary {
    background: rgba(193, 155, 51, 0.08);
    border-bottom-color: #c19b33;
}

.btn-pay {
    background: #e50914;
    color: #fff;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 8px;
    font-weight: 800;
    text-transform: uppercase;
    font-size: 13px;
    margin-top: 25px;
    transition: 0.3s;
}

.btn-pay.btn-vip-pay {
    background: #c19b33;
    color: #050505;
}

.btn-pay:hover {
    filter: brightness(1.2);
    transform: scale(1.02);
}

.back-link {
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
    margin-top: 20px;
    display: inline-block;
}

.back-link:hover { 
    color: #fff; 
}

@media (max-width: 580px) {
    body {
        align-items: flex-start;
        padding: 15px;
    }

    .booking-card {
        padding: 30px 20px;
        min-height: auto;
        box-shadow: none;
    }

    h2 {
        font-size: 22px;
        margin-bottom: 20px;
    }

    .info-group {
        padding: 12px;
    }

    .info-value {
        font-size: 14px;
    }

    .summary-box {
        padding: 15px;
        margin-top: 15px;
    }

    .btn-pay {
        padding: 14px;
        font-size: 12px;
        margin-top: 20px;
    }
}
</style>
</head>
<body>

    <div class="booking-card text-center">
        <div>
            <span class="step-title" id="checkoutStep">Check-out</span>
            <h2>Finalizar Compra</h2>
        </div>

        <div class="info-group">
            <span class="info-label">Filme</span>
            <div class="info-value" id="resumoFilme">--</div>
        </div>

        <div class="row g-2">
            <div class="col-6">
                <div class="info-group">
                    <span class="info-label">Sala</span>
                    <div class="info-value" id="resumoSala">--</div>
                </div>
            </div>
            <div class="col-6">
                <div class="info-group">
                    <span class="info-label">Horário</span>
                    <div class="info-value" id="resumoHora">--:--</div>
                </div>
            </div>
        </div>

        <div class="info-group">
            <span class="info-label">Assentos</span>
            <div class="info-value">
                <i class="fas fa-couch" id="iconAssento"></i> 
                <span id="resumoAssentos">--</span>
            </div>
        </div>

        <div class="summary-box" id="summaryBox">
            <p class="mb-0 small text-muted fw-bold">TOTAL A PAGAR</p>
            <h3 class="mb-0 fw-bold" id="resumoTotal">R$ 0,00</h3>
        </div>

        <button class="btn-pay" id="btnPay" onclick="pagar()">Confirmar Pagamento</button>
        
        <a href="javascript:history.back()" class="back-link">
            <i class="fas fa-arrow-left me-1"></i> ALTERAR ASSENTOS
        </a>
    </div>

    <script src="js/ingressosView.js"></script>

</body>
</html>
