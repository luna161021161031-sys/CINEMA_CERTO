<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleção de Assentos - CinePro Ultra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
body { 
    background: #050505; 
    color: #fff; 
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.cinema-container {
    background: rgba(15, 15, 15, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 32px;
    padding: 40px;
    width: 100%;
    max-width: 900px;
    text-align: center;
    position: relative;
}

.movie-header {
    text-align: left;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.movie-header h2 { 
    font-weight: 800; 
    text-transform: uppercase; 
    font-size: 24px; 
    margin: 0; 
    color: #fff;
}
.session-info {
    display: flex;
    gap: 15px;
    margin-top: 8px;
}
.info-tag {
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
}

.tag-sala { 
    color: #fff; 
    background: #e50914; 
    padding: 2px 8px; 
    border-radius: 4px; 
}
.tag-hora { 
    color: #e50914; 
    border: 1px solid #e50914; 
    padding: 1px 8px; 
    border-radius: 4px; 
}

.screen-container { 
    perspective: 400px; 
    margin-bottom: 50px; 
}
.screen {
    height: 10px; 
    width: 80%; 
    background: #e50914; 
    margin: 0 auto;
    transform: rotateX(-45deg);
    box-shadow: 0 15px 50px rgba(229, 9, 20, 0.7);
    border-radius: 5px;
}
.screen-text { 
    font-size: 10px; 
    color: rgba(255,255,255,0.3); 
    text-transform: uppercase; 
    letter-spacing: 5px; 
    margin-top: 15px; 
    text-align: center;
}

.seats-grid { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 12px; 
    margin-bottom: 40px; 
}
.row { 
    display: flex; 
    gap: 12px; 
    justify-content: center; 
}
.seat {
    width: 40px; 
    height: 40px; 
    background: rgba(255, 255, 255, 0.1);
    border-radius: 6px; 
    cursor: pointer; 
    transition: 0.2s;
    display: flex; 
    align-items: center; 
    justify-content: center;
    font-size: 10px; 
    font-weight: 700; 
    color: transparent;
}
.seat:hover:not(.occupied) { 
    background: rgba(255, 255, 255, 0.3); 
    color: #fff; 
    transform: scale(1.1); 
}
.seat.selected { 
    background: #e50914; 
    color: #fff; 
    box-shadow: 0 0 15px rgba(229, 9, 20, 0.5); 
}
.seat.occupied { 
    background: rgba(255, 255, 255, 0.03); 
    cursor: not-allowed; 
    position: relative; 
}
.seat.occupied::after { 
    content: "X"; 
    color: rgba(255,255,255,0.1); 
    font-size: 12px; 
}

.legend { 
    display: flex; 
    justify-content: center; 
    gap: 25px; 
    margin-bottom: 40px; 
    padding: 15px; 
    background: rgba(255,255,255,0.02); 
    border-radius: 12px; 
}
.legend-item { 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    font-size: 12px; 
    color: rgba(255,255,255,0.6); 
}
.legend-item .seat { 
    width: 18px; 
    height: 18px; 
    cursor: default; 
}

.booking-summary { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-top: 1px solid rgba(255,255,255,0.1); 
    padding-top: 30px; 
}
.info h4 { 
    font-weight: 800; 
    margin: 0; 
}
.info p { 
    color: #e50914; 
    margin: 0; 
    font-weight: 700; 
    font-size: 14px; 
}

.btn-confirm { 
    background: #fff; 
    color: #000; 
    border: none; 
    padding: 12px 35px; 
    border-radius: 12px; 
    font-weight: 800; 
    text-transform: uppercase; 
    font-size: 12px; 
    transition: 0.3s; 
}
.btn-confirm:hover { 
    transform: scale(1.05); 
    background: #e50914; 
    color: #fff; 
}

.btn-back { 
    position: absolute; 
    top: 40px; 
    right: 40px; 
    color: rgba(255,255,255,0.4); 
    text-decoration: none; 
    font-size: 12px; 
    font-weight: 600; 
}
.btn-back:hover { 
    color: #fff; 
}

body.vip-theme .seat.selected {
    background-color: #c19b33;
    border-color: #c19b33;
    color: #050505;
}

@media (max-width: 768px) {
    body {
        padding: 10px;
        align-items: flex-start;
    }

    .cinema-container {
        padding: 20px 15px;
        border-radius: 20px;
    }

    .btn-back {
        position: static;
        display: block;
        text-align: left;
        margin-bottom: 20px;
    }

    .movie-header h2 {
        font-size: 18px;
    }

    .session-info {
        gap: 10px;
    }

    .info-tag {
        font-size: 11px;
    }

    .screen-container {
        margin-bottom: 35px;
    }

    .seats-grid {
        gap: 6px;
        overflow-x: auto;
        padding-bottom: 15px;
        width: 100%;
        justify-content: flex-start;
    }

    .row {
        gap: 6px;
    }

    .seat {
        width: 30px;
        height: 30px;
        font-size: 8px;
        color: #fff;
    }

    .seat.occupied::after {
        font-size: 10px;
    }

    .legend {
        gap: 15px;
        padding: 10px;
        flex-wrap: wrap;
    }

    .legend-item {
        font-size: 11px;
    }

    .booking-summary {
        flex-direction: column;
        gap: 20px;
        text-align: center;
        padding-top: 20px;
    }

    .btn-confirm {
        width: 100%;
        padding: 14px;
    }
}
    </style>
</head>
<body>

    <div class="cinema-container">
        <a href="javascript:history.back()" class="btn-back"><i class="fas fa-times me-1"></i> CANCELAR</a>

        <div class="movie-header">
            <h2 id="displayFilme">FILME</h2>
            <div class="session-info">
                <span class="info-tag tag-sala" id="displaySala">SALA --</span>
                <span class="info-tag tag-hora"><i class="far fa-clock me-1"></i> <span id="displayHora">--:--</span></span>
            </div>
        </div>

        <div class="screen-container">
            <div class="screen"></div>
            <div class="screen-text">TELA</div>
        </div>

        <div class="seats-grid" id="seatsGrid"></div>

        <div class="legend">
            <div class="legend-item"><div class="legend-seat"></div> Disponível</div>
            <div class="legend-item"><div class="legend-seat selected"></div> Selecionado</div>
            <div class="legend-item"><div class="legend-seat occupied"></div> Ocupado</div>
        </div>

        <div class="booking-summary">
            <div class="info">
                <p id="seatCount">0 Assentos selecionados</p>
                <h4 id="totalPrice">R$ 0,00</h4>
            </div>
            <button class="btn-confirm" onclick="finalizarReserva()">Confirmar Reserva</button>
        </div>
    </div>

    <script src="js/assentosView.js"></script>
</body>
</html>
</body>
</html>
