<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - CinePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
    background-color: #050505;
    color: white; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.profile-container {
    padding-top: 100px;
    padding-bottom: 50px;
}

.profile-card {
    background: rgba(15, 15, 15, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.user-header {
    border-left: 4px solid #e50914;
    padding-left: 20px;
    margin-bottom: 30px;
}

.user-name {
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: white;
}

.table-responsive {
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.table {
    background: #000000; 
    color: white; 
    margin-bottom: 0;
}

.table > :not(caption) > * > * {
    background-color: #000000;
    color: white;
    border-bottom-color: rgba(255, 255, 255, 0.1);
}

.table thead {
    background-color: #e50914;
}

.table thead th {
    border: none;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 1px;
    padding: 15px;
    color: white; 
    background-color: #e50914 !important;
}

.table tbody td {
    padding: 15px;
    vertical-align: middle;
}

.badge-seat {
    background: rgba(229, 9, 20, 0.2);
    color: #ff4d4d; 
    border: 1px solid #e50914;
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 0.9rem;
}

.btn-back {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    padding: 12px 30px;
    border-radius: 30px;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
    margin-top: 25px;
    font-weight: 600;
    font-size: 0.9rem;
}

.btn-back:hover {
    background: white;
    color: black;
    border-color: white;
}

.text-muted {
    color: #aaa !important; 
}

.btn-sair {
    background: #e50914;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 5px;
    font-weight: 600;
    transition: all 0.3s ease;
    float: right; 
    margin-bottom: 20px;
}

.btn-sair:hover {
    background: #b20710;
    transform: scale(1.05);
}
.profile-container::after {
    content: "";
    clear: both;
    display: table;
}

.table tbody tr {
    transition: background-color 0.2s ease
}

.table tbody tr:hover {
    background-color: rgba(255, 255, 255, 0.03) !important;
}

.table tbody tr:hover td {
    background-color: rgba(255, 255, 255, 0.03) !important;
}

@media (max-width: 768px) {
    .profile-container {
        padding-top: 80px;
        padding-bottom: 30px;
        padding-left: 15px;
        padding-right: 15px;
    }

    .profile-card {
        padding: 20px 15px;
    }

    .btn-sair {
        float: none;
        width: 100%;
        margin-bottom: 25px;
        padding: 12px;
        text-align: center;
        display: block;
    }

    .user-header {
        margin-bottom: 20px;
    }

    .user-name {
        font-size: 20px;
    }

    .table thead th, 
    .table tbody td {
        padding: 10px;
        font-size: 13px;
    }

    .badge-seat {
        padding: 2px 8px;
        font-size: 12px;
    }

    .btn-back {
        width: 100%;
        text-align: center;
        padding: 12px;
        margin-top: 20px;
    }
}
</style>
</head>
<body>

<div class="container profile-container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="profile-card">
                
                <div class="user-header d-flex justify-content-between align-items-start">
                    <div>
                        <p class="text-muted mb-1 text-uppercase small">Área do Cliente</p>
                        <h2 class="user-name">Olá, <span id="nomeUsuario">...</span>!</h2>
                    </div>
                    <button onclick="fazerLogout()" class="btn-sair">
                        <i class="fas fa-sign-out-alt me-2"></i>Sair
                    </button>
                </div>

                <h5 class="mb-4 text-white">
                    <i class="fas fa-ticket-alt me-2" style="color: #e50914;"></i>Seus Ingressos
                </h5>

                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Filme</th>
                                <th>Assento</th>
                                <th>Data e Hora</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaCorpo">
                        </tbody>
                    </table>
                </div>

                <div id="areaAdmin" class="mt-4 d-none">
                    <h5 class="mb-3 text-white"><i class="fas fa-users-cog me-2 text-danger"></i>Logins do Sistema</h5>
                    <div class="table-responsive mt-0">
                        <table class="table text-center">
                            <thead><tr><th>ID</th><th>Usuário</th><th>Tipo</th><th>Ação</th></tr></thead>
                            <tbody id="tabelaUsuariosCorpo"></tbody>
                        </table>
                    </div>
                </div>

                <div class="d-flex flex-wrap gap-2 mt-4">
                    <a href="menu.html" class="btn-back mt-0">
                        <i class="fas fa-arrow-left me-2"></i>Voltar ao Início
                    </a>
                    <button id="btnVerLogins" class="btn-back mt-0 d-none" style="border-color: #e50914; color: #e50914;" onclick="verLogins()">
                        <i class="fas fa-users me-2"></i>Ver Logins
                    </button>
                </div>
        </div>
    </div>
</div>

<script src="js/perfilView.js"></script>
</body>
</html>
</body>
</html>
