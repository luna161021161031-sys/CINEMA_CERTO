<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - CinePro Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
body {
    background-color: #050505;
    color: white; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.admin-container {
    padding-top: 100px;
    padding-bottom: 50px;
}

.admin-card {
    background: rgba(15, 15, 15, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.admin-header {
    border-left: 4px solid #e50914;
    padding-left: 15px;
    margin-bottom: 30px;
}

.table {
    color: white !important;
    background-color: transparent;
}

.table thead th {
    border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    color: #aaa;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 1px;
}

.table tbody td {
    padding: 15px 10px;
    vertical-align: middle;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.btn-remover {
    background: rgba(229, 9, 20, 0.1);
    color: #e50914;
    border: 1px solid #e50914;
    padding: 6px 12px;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-remover:hover {
    background: #e50914;
    color: white;
    box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
}

.btn-back {
    display: inline-flex;
    align-items: center;
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
    margin-top: 20px;
    transition: color 0.3s;
}

.btn-back:hover {
    color: #fff;
}

.badge-role {
    background: rgba(255, 193, 7, 0.1);
    color: #ffc107;
    border: 1px solid #ffc107;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container admin-container">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="admin-card">
                
                <div class="admin-header d-flex justify-content-between align-items-center">
                    <div>
                        <p class="text-muted mb-1 text-uppercase small">Painel de Controle</p>
                        <h2 class="fw-bold m-0 text-white">Gerenciar Usuários</h2>
                    </div>
                </div>

                <h5 class="mb-4 text-white">
                    <i class="fas fa-users me-2" style="color: #e50914;"></i>Lista de Clientes Cadastrados
                </h5>

                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome de Usuário</th>
                                <th>Cargo</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaUsuariosCorpo">
                            <tr>
                                <td colspan="4" class="text-center py-4 text-muted">
                                    Carregando usuários...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <a href="perfil.html" class="btn-back">
                    <i class="fas fa-arrow-left me-2"></i>Voltar ao Perfil
                </a>
            </div>
        </div>
    </div>
</div>

<script src="js/adminView.js"></script>
</body>
</html>
